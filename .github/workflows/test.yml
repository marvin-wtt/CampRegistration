name: Build and Test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

# Cancel superseded PR runs, but let every main-branch run finish.
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read
  pull-requests: write

jobs:
  verify-migrations:
    runs-on: ubuntu-24.04
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false

    services:
      # Use MySQL (not MariaDB) as the shadow database. Prisma's `mysql` provider
      # models native MySQL JSON, but MariaDB aliases JSON to LONGTEXT, which makes
      # `migrate diff` report a spurious "type changed" on every JSON column.
      mysql:
        image: mysql:8
        env:
          MYSQL_DATABASE: shadow_db
          MYSQL_ROOT_PASSWORD: admin123
        options: >-
          --health-cmd "mysqladmin ping -h 127.0.0.1 --silent"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
          --health-start-period 30s
        ports:
          - 3306:3306

    env:
      SHADOW_DATABASE_URL: mysql://root:admin123@localhost:3306/shadow_db

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Verify migrations
        working-directory: backend
        run: >
          npx prisma migrate diff
          --exit-code
          --from-migrations prisma/migrations
          --to-schema prisma/schema.prisma

  test-common:
    runs-on: ubuntu-24.04
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Test common
        run: npm run test --workspace common

      - name: Report coverage
        if: always() && github.event_name == 'pull_request'
        uses: davelosert/vitest-coverage-report-action@v2
        with:
          name: Common
          working-directory: common
          json-summary-path: tests/coverage/coverage-summary.json
          json-final-path: tests/coverage/coverage-final.json
          comment-on: pr
          file-coverage-mode: changes

  test-backend:
    runs-on: ubuntu-24.04
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false

    strategy:
      matrix:
        node: [22, 24]

    container:
      image: node:${{ matrix.node }}-bookworm

    services:
      mariadb:
        image: mariadb:10.11.15
        env:
          MYSQL_DATABASE: test_db
          MYSQL_ROOT_PASSWORD: admin123
        options: >-
          --health-cmd "mysqladmin ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 3

      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      APP_PORT: 3000
      APP_URL: http://localhost:3000
      APP_NAME: Test App
      DATABASE_URL: mysql://root:admin123@mariadb:3306/test_db
      SHADOW_DATABASE_URL: mysql://root:admin123@mariadb:3306/shadow_db
      TMP_DIR: tests/tmp/storage/tmp/
      UPLOAD_DIR: tests/tmp/storage/uploads/
      STORAGE_LOCATION: local
      JWT_SECRET: oxcch29nu7OKSZ2Wia8U7Y/4TiCqd9lWpIm/skZOpVM=
      CSRF_SECRET: pwXh922dSwF1tjaDmpwhrWZjNbu771PCgv70cRc37so=
      TOTP_RECOVERY_CODE_SECRET: gDHSH6MScBYrYWg7lXPprOewzZWBr0+srB+avI4SfQM=
      EMAIL_DRIVER: noop
      EMAIL_FROM: noreply@yourapp.com
      EMAIL_REPLY_TO: noreply@yourapp.com
      EMAIL_ADMIN: admin@yourapp.com
      REDIS_HOST: redis
      REDIS_PORT: 6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      # Build on both supported Node versions. Reusing a Node 22 build here would
      # stop this matrix from verifying that the project also compiles on Node 24.
      - name: Build common
        run: npm run build --workspace common

      - name: Build backend
        run: npm run build --workspace backend

      - name: Migrate test database
        run: npm run migrate --workspace backend

      - name: Test backend
        run: >
          npm run test --workspace backend --
          --coverage.enabled=true
          --coverage.reporter=json-summary
          --coverage.reporter=json

      - name: Report coverage
        if: always() && matrix.node == 24 && github.event_name == 'pull_request'
        uses: davelosert/vitest-coverage-report-action@v2
        with:
          name: Backend
          working-directory: backend
          json-summary-path: tests/coverage/coverage-summary.json
          json-final-path: tests/coverage/coverage-final.json
          comment-on: pr
          file-coverage-mode: changes

  test-frontend:
    runs-on: ubuntu-24.04
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build common
        run: npm run build --workspace common

      - name: Test frontend
        run: >
          npm run test --workspace frontend --
          --coverage.enabled=true
          --coverage.reporter=json-summary
          --coverage.reporter=json

      - name: Report coverage
        if: always() && github.event_name == 'pull_request'
        uses: davelosert/vitest-coverage-report-action@v2
        with:
          name: Frontend
          working-directory: frontend
          json-summary-path: tests/coverage/coverage-summary.json
          json-final-path: tests/coverage/coverage-final.json
          comment-on: pr
          file-coverage-mode: changes

  # Production assets are built once per workflow run and passed only to E2E jobs.
  # This avoids five identical builds without delaying the independent unit tests.
  build-e2e:
    runs-on: ubuntu-24.04
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false

    env:
      APP_PORT: 3001
      APP_URL: http://localhost:3001
      APP_NAME: Test App
      DATABASE_URL: mysql://root:admin123@localhost:3306/test_db
      SHADOW_DATABASE_URL: mysql://root:admin123@localhost:3306/shadow_db
      TMP_DIR: tests/tmp/storage/tmp/
      UPLOAD_DIR: tests/tmp/storage/uploads/
      STORAGE_LOCATION: local
      JWT_SECRET: oxcch29nu7OKSZ2Wia8U7Y/4TiCqd9lWpIm/skZOpVM=
      CSRF_SECRET: pwXh922dSwF1tjaDmpwhrWZjNbu771PCgv70cRc37so=
      TOTP_RECOVERY_CODE_SECRET: gDHSH6MScBYrYWg7lXPprOewzZWBr0+srB+avI4SfQM=
      SMTP_HOST: localhost
      SMTP_PORT: 1025
      SMTP_SECURE: false
      SMTP_USERNAME: user
      SMTP_PASSWORD: password
      EMAIL_FROM: noreply@yourapp.com
      EMAIL_REPLY_TO: noreply@yourapp.com
      EMAIL_ADMIN: admin@yourapp.com
      RATE_LIMIT_DISABLED: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build common
        run: npm run build --workspace common

      - name: Build backend
        run: npm run build --workspace backend

      - name: Build frontend
        run: npm run build --workspace frontend

      - name: Upload E2E build
        uses: actions/upload-artifact@v7
        with:
          name: e2e-build-${{ github.sha }}
          path: |
            common/dist/
            backend/build/
            backend/src/generated/
            frontend/dist/spa/
          if-no-files-found: error
          retention-days: 1

  test-e2e:
    needs: build-e2e
    runs-on: ubuntu-24.04
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false

    strategy:
      fail-fast: false
      matrix:
        include:
          - project: chromium
            browser: chromium
          - project: firefox
            browser: firefox
          - project: webkit
            browser: webkit
          - project: mobile-chrome
            browser: chromium
          - project: mobile-safari
            browser: webkit

    services:
      mariadb:
        image: mariadb:10.11.15
        env:
          MYSQL_DATABASE: test_db
          MYSQL_ROOT_PASSWORD: admin123
        options: >-
          --health-cmd "mysqladmin ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 3
        ports:
          - 3306:3306

      maildev:
        image: maildev/maildev:2.2.1
        env:
          MAILDEV_SMTP_PORT: 1025
          MAILDEV_WEB_PORT: 1081
          MAILDEV_INCOMING_USER: user
          MAILDEV_INCOMING_PASS: password
        ports:
          - 1025:1025
          - 1081:1081

    env:
      CI: true
      APP_PORT: 3001
      APP_URL: http://localhost:3001
      APP_NAME: Test App
      DATABASE_URL: mysql://root:admin123@localhost:3306/test_db
      SHADOW_DATABASE_URL: mysql://root:admin123@localhost:3306/shadow_db
      TMP_DIR: tests/tmp/storage/tmp/
      UPLOAD_DIR: tests/tmp/storage/uploads/
      STORAGE_LOCATION: local
      JWT_SECRET: oxcch29nu7OKSZ2Wia8U7Y/4TiCqd9lWpIm/skZOpVM=
      CSRF_SECRET: pwXh922dSwF1tjaDmpwhrWZjNbu771PCgv70cRc37so=
      TOTP_RECOVERY_CODE_SECRET: gDHSH6MScBYrYWg7lXPprOewzZWBr0+srB+avI4SfQM=
      SMTP_HOST: localhost
      SMTP_PORT: 1025
      SMTP_SECURE: false
      SMTP_USERNAME: user
      SMTP_PASSWORD: password
      EMAIL_FROM: noreply@yourapp.com
      EMAIL_REPLY_TO: noreply@yourapp.com
      EMAIL_ADMIN: admin@yourapp.com

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Download E2E build
        uses: actions/download-artifact@v8
        with:
          name: e2e-build-${{ github.sha }}
          path: .

      # Mobile Chrome uses Chromium; Mobile Safari uses WebKit. Install only the
      # engine required by this matrix entry instead of all Playwright browsers.
      - name: Install Playwright browser
        working-directory: e2e
        run: npx playwright install --with-deps "${{ matrix.browser }}"

      - name: Migrate test database
        run: npm run migrate --workspace backend

      # The Playwright config should start the already-built application through
      # its webServer configuration; it must not invoke a build command here.
      - name: Run Playwright tests
        working-directory: e2e
        run: npx playwright test --project="${{ matrix.project }}"

      - name: Upload Playwright results
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: playwright-${{ matrix.project }}-${{ github.sha }}
          path: |
            e2e/playwright-report/
            e2e/test-results/
          if-no-files-found: ignore
          retention-days: 14